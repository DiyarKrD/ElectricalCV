<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate CV Builder - Professional & Creative Styles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&family=Poppins:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&family=Raleway:wght@300;400;500;600;700&family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base Styles */
        body { font-family: 'Inter', sans-serif; }
        
        /* Template Specific Fonts */
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        .font-oswald { font-family: 'Oswald', sans-serif; }
        .font-raleway { font-family: 'Raleway', sans-serif; }
        .font-bebas { font-family: 'Bebas Neue', cursive; }
        .font-space { font-family: 'Space Grotesk', sans-serif; }
        
        /* Print Styles */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
            #cv-container { box-shadow: none !important; margin: 0 !important; }
        }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        /* Color Picker Customization */
        input[type="color"] { -webkit-appearance: none; border: none; width: 32px; height: 32px; border-radius: 50%; overflow: hidden; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
        
        /* Range Slider */
        input[type="range"] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #e5e7eb; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
        
        /* Template Previews */
        .template-card { transition: all 0.3s ease; cursor: pointer; }
        .template-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .template-card.active { ring: 2px solid #3b82f6; ring-offset: 2px; }
        
        /* CV Container */
        #cv-container { transition: all 0.3s ease; }
        
        /* Draggable Elements */
        .draggable-item { cursor: move; }
        .draggable-item.dragging { opacity: 0.5; }
        
        /* Template 1: Modern Minimalist */
        .template-modern-minimalist { background: white; }
        
        /* Template 2: Classic Professional */
        .template-classic-pro { background: white; border-top: 8px solid var(--primary-color, #1e40af); }
        
        /* Template 3: Creative Sidebar */
        .template-creative-sidebar { display: grid; grid-template-columns: 300px 1fr; min-height: 100%; }
        
        /* Template 4: Two Column Technical */
        .template-two-column-tech { column-count: 2; column-gap: 40px; }
        
        /* Template 5: Executive Header */
        .template-executive { background: linear-gradient(to bottom, var(--primary-color, #1e293b) 200px, white 200px); }
        
        /* Template 6: Timeline Vertical */
        .template-timeline { position: relative; }
        .template-timeline::before { content: ''; position: absolute; left: 120px; top: 0; bottom: 0; width: 2px; background: var(--primary-color, #e5e7eb); }
        
        /* Template 7: Card Based */
        .template-cards .section-card { background: #f8fafc; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        
        /* Template 8: Dark Mode Professional */
        .template-dark-pro { background: #0f172a; color: #f8fafc; }
        .template-dark-pro .text-gray-600, .template-dark-pro .text-gray-700, .template-dark-pro .text-gray-800 { color: #cbd5e1 !important; }
        
        /* Template 9: Colorful Vibrant */
        .template-colorful { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px; }
        .template-colorful .cv-content { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        
        /* Template 10: Grid Layout */
        .template-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        
        /* Template 11: Centered Focus */
        .template-centered { text-align: center; max-width: 700px; margin: 0 auto; }
        
        /* Template 12: Left Heavy */
        .template-left-heavy { padding-left: 60px; border-left: 4px solid var(--primary-color, #3b82f6); }
        
        /* Template 13: Right Heavy */
        .template-right-heavy { padding-right: 60px; border-right: 4px solid var(--primary-color, #3b82f6); text-align: right; }
        .template-right-heavy .flex { flex-direction: row-reverse; }
        
        /* Template 14: Compact Single Page */
        .template-compact { font-size: 0.9rem; line-height: 1.4; padding: 30px; }
        
        /* Template 15: Magazine Style */
        .template-magazine { background: #fafafa; }
        .template-magazine .headline { font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }
        
        /* Template 16: Infographic Heavy */
        .template-infographic .skill-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
        .template-infographic .skill-fill { height: 100%; background: var(--primary-color, #3b82f6); border-radius: 4px; }
        
        /* Template 17: Minimal Text */
        .template-minimal-text { padding: 60px; }
        .template-minimal-text h1 { font-weight: 300; letter-spacing: 0.2em; }
        
        /* Template 18: Bold Typography */
        .template-bold-type { font-weight: 900; text-transform: uppercase; }
        .template-bold-type h1 { font-size: 4rem; line-height: 0.9; }
        
        /* Template 19: Photo Focus */
        .template-photo-focus .photo-container { width: 200px; height: 200px; border-radius: 50%; overflow: hidden; margin: 0 auto 30px; border: 5px solid var(--primary-color, #3b82f6); }
        
        /* Template 20: Contact Bottom */
        .template-contact-bottom { display: flex; flex-direction: column; }
        .template-contact-bottom .contact-section { order: 999; margin-top: 40px; padding-top: 40px; border-top: 2px solid #e5e7eb; }
        
        /* Template 21: Striped Sections */
        .template-striped section:nth-child(odd) { background: #f8fafc; padding: 20px; margin: 0 -40px; padding-left: 40px; padding-right: 40px; }
        
        /* Template 22: Elegant Serif */
        .template-elegant { font-family: 'Playfair Display', serif; }
        .template-elegant h1, .template-elegant h2 { font-weight: 400; letter-spacing: -1px; }
        
        /* Position Classes */
        .pos-top-left { position: absolute; top: 20px; left: 20px; }
        .pos-top-center { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); }
        .pos-top-right { position: absolute; top: 20px; right: 20px; }
        .pos-bottom-left { position: absolute; bottom: 20px; left: 20px; }
        .pos-bottom-center { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
        .pos-bottom-right { position: absolute; bottom: 20px; right: 20px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Control Panel (No Print) -->
    <div class="no-print bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-full mx-auto px-4 py-3">
            <div class="flex flex-wrap items-center gap-4 justify-between">
                <div class="flex items-center gap-3">
                    <i data-lucide="file-text" class="w-6 h-6 text-blue-600"></i>
                    <h1 class="font-bold text-lg text-gray-800">CV Master Builder</h1>
                </div>
                
                <div class="flex flex-wrap items-center gap-3">
                    <button onclick="togglePanel('templates-panel')" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 transition flex items-center gap-2 text-sm font-medium">
                        <i data-lucide="layout" class="w-4 h-4"></i> Styles (22)
                    </button>
                    <button onclick="togglePanel('customize-panel')" class="px-4 py-2 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 transition flex items-center gap-2 text-sm font-medium">
                        <i data-lucide="sliders" class="w-4 h-4"></i> Customize
                    </button>
                    <button onclick="togglePanel('content-panel')" class="px-4 py-2 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 transition flex items-center gap-2 text-sm font-medium">
                        <i data-lucide="edit" class="w-4 h-4"></i> Content
                    </button>
                    <button onclick="window.print()" class="px-4 py-2 bg-gray-900 text-white rounded-lg hover:bg-gray-800 transition flex items-center gap-2 text-sm font-medium">
                        <i data-lucide="printer" class="w-4 h-4"></i> Print / PDF
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Templates Panel -->
        <div id="templates-panel" class="hidden border-t border-gray-200 bg-gray-50 max-h-96 overflow-y-auto">
            <div class="p-4">
                <h3 class="text-sm font-semibold text-gray-700 mb-3 uppercase tracking-wider">Choose Your Style</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-11 gap-3" id="template-grid">
                    <!-- Template buttons generated by JS -->
                </div>
            </div>
        </div>
        
        <!-- Customize Panel -->
        <div id="customize-panel" class="hidden border-t border-gray-200 bg-gray-50">
            <div class="p-4 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 max-w-7xl mx-auto">
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Primary Color</label>
                    <div class="flex items-center gap-2">
                        <input type="color" id="primary-color" value="#3b82f6" onchange="updateStyle()">
                        <span class="text-sm text-gray-600" id="primary-color-value">#3b82f6</span>
                    </div>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Secondary Color</label>
                    <div class="flex items-center gap-2">
                        <input type="color" id="secondary-color" value="#1e40af" onchange="updateStyle()">
                        <span class="text-sm text-gray-600" id="secondary-color-value">#1e40af</span>
                    </div>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Name Font Size</label>
                    <input type="range" id="name-size" min="24" max="96" value="36" class="w-full" oninput="updateStyle()">
                    <div class="flex justify-between text-xs text-gray-500 mt-1">
                        <span>24px</span>
                        <span id="name-size-value">36px</span>
                        <span>96px</span>
                    </div>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Profession Font Size</label>
                    <input type="range" id="profession-size" min="14" max="48" value="18" class="w-full" oninput="updateStyle()">
                    <div class="flex justify-between text-xs text-gray-500 mt-1">
                        <span>14px</span>
                        <span id="profession-size-value">18px</span>
                        <span>48px</span>
                    </div>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Name Color</label>
                    <div class="flex items-center gap-2">
                        <input type="color" id="name-color" value="#111827" onchange="updateStyle()">
                        <span class="text-sm text-gray-600" id="name-color-value">#111827</span>
                    </div>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Profession Color</label>
                    <div class="flex items-center gap-2">
                        <input type="color" id="profession-color" value="#3b82f6" onchange="updateStyle()">
                        <span class="text-sm text-gray-600" id="profession-color-value">#3b82f6</span>
                    </div>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Font Family</label>
                    <select id="font-family" class="w-full text-sm border border-gray-300 rounded px-2 py-1" onchange="updateStyle()">
                        <option value="font-sans">Inter (Modern)</option>
                        <option value="font-playfair">Playfair (Elegant)</option>
                        <option value="font-poppins">Poppins (Geometric)</option>
                        <option value="font-mono">Roboto Mono (Technical)</option>
                        <option value="font-oswald">Oswald (Condensed)</option>
                        <option value="font-raleway">Raleway (Clean)</option>
                        <option value="font-bebas">Bebas Neue (Bold)</option>
                        <option value="font-space">Space Grotesk (Futuristic)</option>
                    </select>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Photo Position</label>
                    <select id="photo-position" class="w-full text-sm border border-gray-300 rounded px-2 py-1" onchange="updateStyle()">
                        <option value="top-left">Top Left</option>
                        <option value="top-center">Top Center</option>
                        <option value="top-right">Top Right</option>
                        <option value="inline">Inline with Text</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Section Spacing</label>
                    <input type="range" id="section-spacing" min="0" max="60" value="24" class="w-full" oninput="updateStyle()">
                    <div class="flex justify-between text-xs text-gray-500 mt-1">
                        <span>0px</span>
                        <span id="section-spacing-value">24px</span>
                        <span>60px</span>
                    </div>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Page Padding</label>
                    <input type="range" id="page-padding" min="20" max="80" value="40" class="w-full" oninput="updateStyle()">
                    <div class="flex justify-between text-xs text-gray-500 mt-1">
                        <span>20px</span>
                        <span id="page-padding-value">40px</span>
                        <span>80px</span>
                    </div>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Name Position</label>
                    <select id="name-position" class="w-full text-sm border border-gray-300 rounded px-2 py-1" onchange="updateStyle()">
                        <option value="default">Default</option>
                        <option value="center">Center</option>
                        <option value="left">Left</option>
                        <option value="right">Right</option>
                    </select>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Contact Position</label>
                    <select id="contact-position" class="w-full text-sm border border-gray-300 rounded px-2 py-1" onchange="updateStyle()">
                        <option value="header">Below Header</option>
                        <option value="sidebar">Sidebar Style</option>
                        <option value="bottom">Bottom of CV</option>
                        <option value="top">Top (Above Name)</option>
                    </select>
                </div>
                
                <div class="bg-white p-3 rounded-lg border border-gray-200 col-span-1 md:col-span-2">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Layout Positioning</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setLayout('default')" class="px-3 py-2 text-xs bg-gray-100 hover:bg-gray-200 rounded transition">Default Flow</button>
                        <button onclick="setLayout('split')" class="px-3 py-2 text-xs bg-gray-100 hover:bg-gray-200 rounded transition">Split View</button>
                        <button onclick="setLayout('centered')" class="px-3 py-2 text-xs bg-gray-100 hover:bg-gray-200 rounded transition">Center Aligned</button>
                        <button onclick="setLayout('wide')" class="px-3 py-2 text-xs bg-gray-100 hover:bg-gray-200 rounded transition">Wide Stretch</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Content Panel -->
        <div id="content-panel" class="hidden border-t border-gray-200 bg-gray-50 max-h-96 overflow-y-auto">
            <div class="p-4 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="space-y-3">
                    <h4 class="font-semibold text-sm text-gray-700 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4"></i> Personal Info
                    </h4>
                    <input type="text" id="input-name" placeholder="Full Name" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()">
                    <input type="text" id="input-profession" placeholder="Profession (e.g. Electrical Engineer)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()">
                    <input type="text" id="input-age" placeholder="Age (e.g. 22)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()">
                    <input type="file" id="input-photo" accept="image/*" class="w-full text-sm" onchange="updatePhoto()">
                </div>
                
                <div class="space-y-3">
                    <h4 class="font-semibold text-sm text-gray-700 flex items-center gap-2">
                        <i data-lucide="graduation-cap" class="w-4 h-4"></i> Education
                    </h4>
                    <input type="text" id="input-degree" placeholder="Degree Title" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()">
                    <input type="text" id="input-university" placeholder="University/Institution" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()">
                    <input type="number" id="input-graduation-year" placeholder="Graduation Year" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()">
                </div>
                
                <div class="space-y-3">
                    <h4 class="font-semibold text-sm text-gray-700 flex items-center gap-2">
                        <i data-lucide="phone" class="w-4 h-4"></i> Contact
                    </h4>
                    <input type="email" id="input-email" placeholder="Email Address" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()">
                    <input type="tel" id="input-phone" placeholder="Phone Number" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()">
                    <input type="text" id="input-location" placeholder="Location (City, Country)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()">
                    <input type="text" id="input-website" placeholder="Website/Portfolio URL" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()">
                </div>
                
                <div class="space-y-3 md:col-span-2 lg:col-span-3">
                    <h4 class="font-semibold text-sm text-gray-700 flex items-center gap-2">
                        <i data-lucide="briefcase" class="w-4 h-4"></i> Experience & Skills
                    </h4>
                    <textarea id="input-experience" placeholder="Work Experience (Job Title | Company | Year - Year&#10;Description...)" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()"></textarea>
                    <textarea id="input-skills" placeholder="Skills (separate with commas)" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()"></textarea>
                    <textarea id="input-summary" placeholder="Professional Summary / About Me" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" oninput="updateContent()"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Main CV Display Area -->
    <div class="min-h-screen p-4 md:p-8 bg-gray-100">
        <div id="cv-wrapper" class="max-w-4xl mx-auto bg-white shadow-2xl relative overflow-hidden" style="min-height: 1100px;">
            <div id="cv-container" class="w-full h-full p-10 template-modern-minimalist animate-fade-in">
                <!-- Dynamic Content Will Be Rendered Here -->
            </div>
        </div>
    </div>

    <script>
        // Template Definitions
        const templates = [
            { id: 'modern-minimalist', name: 'Modern Minimalist', icon: 'minimize-2' },
            { id: 'classic-pro', name: 'Classic Professional', icon: 'briefcase' },
            { id: 'creative-sidebar', name: 'Creative Sidebar', icon: 'sidebar' },
            { id: 'two-column-tech', name: 'Two Column Tech', icon: 'columns' },
            { id: 'executive', name: 'Executive Header', icon: 'crown' },
            { id: 'timeline', name: 'Timeline Vertical', icon: 'arrow-down-circle' },
            { id: 'cards', name: 'Card Based', icon: 'layout-grid' },
            { id: 'dark-pro', name: 'Dark Mode Pro', icon: 'moon' },
            { id: 'colorful', name: 'Colorful Vibrant', icon: 'palette' },
            { id: 'grid', name: 'Grid Layout', icon: 'grid-3x3' },
            { id: 'centered', name: 'Centered Focus', icon: 'align-center' },
            { id: 'left-heavy', name: 'Left Heavy', icon: 'align-left' },
            { id: 'right-heavy', name: 'Right Heavy', icon: 'align-right' },
            { id: 'compact', name: 'Compact Single Page', icon: 'file-minus' },
            { id: 'magazine', name: 'Magazine Style', icon: 'book-open' },
            { id: 'infographic', name: 'Infographic Heavy', icon: 'bar-chart-2' },
            { id: 'minimal-text', name: 'Minimal Text', icon: 'type' },
            { id: 'bold-type', name: 'Bold Typography', icon: 'bold' },
            { id: 'photo-focus', name: 'Photo Focus', icon: 'camera' },
            { id: 'contact-bottom', name: 'Contact Bottom', icon: 'arrow-down' },
            { id: 'striped', name: 'Striped Sections', icon: 'minus' },
            { id: 'elegant', name: 'Elegant Serif', icon: 'feather' }
        ];

        // State
        let currentTemplate = 'modern-minimalist';
        let cvData = {
            name: 'Diyar KRD',
            profession: 'Electrical Engineer',
            age: '22',
            degree: 'Bachelor of Electrical Engineering',
            university: 'University of Technology',
            graduationYear: '2023',
            email: 'diyar.krd@email.com',
            phone: '+964 750 123 4567',

        }

        function setLayout(type) {
            const container = document.getElementById('cv-wrapper');
            switch(type) {
                case 'split':
                    container.style.maxWidth = '1200px';
                    break;
                case 'centered':
                    container.style.maxWidth = '700px';
                    break;
                case 'wide':
                    container.style.maxWidth = '100%';
                    break;
                default:
                    container.style.maxWidth = '896px'; // max-w-4xl
            }
        }

        // Initialize with default data
        window.addEventListener('load', () => {
            // Trigger initial render
            updateContent();
        });
    </script>
</body>
</html>
